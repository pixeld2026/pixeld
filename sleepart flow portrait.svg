<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 1080" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f8fb"/>
      <stop offset="1" stop-color="#eef0f7"/>
    </linearGradient>
    <radialGradient id="art" cx="50%" cy="40%" r="75%">
      <stop offset="0" stop-color="#241b4d"/>
      <stop offset="1" stop-color="#0b0a1f"/>
    </radialGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5d8f"/><stop offset="1" stop-color="#ff3d6e"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6c7bff"/><stop offset="1" stop-color="#3d4dff"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#33e0c4"/><stop offset="1" stop-color="#16b89c"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe066"/><stop offset="1" stop-color="#ffb01f"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6c7bff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6c7bff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="640" height="1080" fill="url(#bg)"/>

  <!-- ===================== 1. HEADBAND ===================== -->
  <g transform="translate(320,40)">
    <circle cx="0" cy="110" r="72" fill="#ffe0c2" stroke="#2c3047" stroke-width="3"/>
    <circle cx="-62" cy="115" r="14" fill="#ffe0c2" stroke="#2c3047" stroke-width="3"/>
    <path d="M18 95 q15 10 30 0" fill="none" stroke="#2c3047" stroke-width="3" stroke-linecap="round"/>
    <path d="M-65 80 q70 -42 142 5 l0 22 q-72 -44 -142 -5 z" fill="#5b6cff" stroke="#2c3047" stroke-width="3"/>
    <circle cx="-30" cy="76" r="6" fill="#ffd23f" stroke="#2c3047" stroke-width="2"/>
    <circle cx="6"  cy="66" r="6" fill="#ff5d8f" stroke="#2c3047" stroke-width="2"/>
    <circle cx="42" cy="70" r="6" fill="#2ec4b6" stroke="#2c3047" stroke-width="2"/>
    <text x="92" y="38" font-size="26" fill="#5b6cff" font-weight="700">z</text>
    <text x="112" y="20" font-size="34" fill="#5b6cff" font-weight="700">Z</text>

    <text x="0" y="220" text-anchor="middle" font-size="26" font-weight="700" fill="#2c3047">Headband</text>
    <text x="0" y="246" text-anchor="middle" font-size="16" fill="#6b7280">biometric data capture (IMU · pulse oximeter)</text>
  </g>

  <!-- arrow 1 -->
  <g>
    <line x1="320" y1="310" x2="320" y2="372" stroke="#9aa0b4" stroke-width="5"/>
    <polygon points="312,372 320,388 328,372" fill="#9aa0b4"/>
    <text x="348" y="348" font-size="15" fill="#6b7280">data</text>
  </g>

  <!-- ===================== 2. PROCESSING UNIT ===================== -->
  <g transform="translate(245,400)">
    <rect x="0" y="0" width="150" height="110" rx="14" fill="#2ec4b6" stroke="#2c3047" stroke-width="3"/>
    <rect x="45" y="32" width="60" height="46" rx="6" fill="#171b2c" stroke="#2c3047" stroke-width="3"/>
    <text x="75" y="60" text-anchor="middle" font-size="13" fill="#9aa0b4" font-weight="700">CPU</text>
    <g stroke="#2c3047" stroke-width="3">
      <line x1="30" y1="32" x2="45" y2="32"/><line x1="30" y1="44" x2="45" y2="44"/><line x1="30" y1="56" x2="45" y2="56"/>
      <line x1="105" y1="32" x2="120" y2="32"/><line x1="105" y1="44" x2="120" y2="44"/><line x1="105" y1="56" x2="120" y2="56"/>
    </g>
    <circle cx="18" cy="18" r="5" fill="#ffd23f" stroke="#2c3047" stroke-width="2"/>

    <text x="75" y="152" text-anchor="middle" font-size="26" font-weight="700" fill="#2c3047">Main Processing Unit</text>
    <text x="75" y="178" text-anchor="middle" font-size="16" fill="#6b7280">analysis + generative image</text>
  </g>

  <!-- arrow 2 -->
  <g>
    <line x1="320" y1="600" x2="320" y2="662" stroke="#9aa0b4" stroke-width="5"/>
    <polygon points="312,662 320,678 328,662" fill="#9aa0b4"/>
    <text x="348" y="638" font-size="15" fill="#6b7280">image</text>
  </g>

  <!-- ===================== 3. PROJECTOR + ART ===================== -->
  <g transform="translate(0,690)">
    <!-- projector -->
    <g transform="translate(70,150)">
      <rect x="0" y="0" width="95" height="62" rx="12" fill="#2c3047"/>
      <circle cx="82" cy="31" r="18" fill="#171b2c" stroke="#5b6cff" stroke-width="3"/>
      <circle cx="82" cy="31" r="7" fill="#5b6cff"/>
      <rect x="16" y="-9" width="18" height="11" rx="3" fill="#2c3047"/>
    </g>

    <!-- beam -->
    <polygon points="160,168 160,212 470,80 470,300" fill="url(#beam)"/>

    <!-- art canvas -->
    <rect x="300" y="60" width="262" height="262" rx="14" fill="url(#art)" stroke="#2c3047" stroke-width="3"/>
    <clipPath id="frame"><rect x="300" y="60" width="262" height="262" rx="14"/></clipPath>
    <g clip-path="url(#frame)">
      <!-- flowing background waves -->
      <path d="M300 200 q70 -60 130 -10 t132 -8" fill="none" stroke="#6c7bff" stroke-width="3" opacity="0.45"/>
      <path d="M300 250 q90 -50 170 0 t110 -20" fill="none" stroke="#33e0c4" stroke-width="3" opacity="0.4"/>
      <path d="M300 150 q60 50 150 20 t120 30" fill="none" stroke="#ff5d8f" stroke-width="3" opacity="0.4"/>
      <!-- glowing organic blobs -->
      <circle cx="385" cy="150" r="44" fill="url(#g1)" opacity="0.92"/>
      <circle cx="470" cy="185" r="56" fill="url(#g2)" opacity="0.88"/>
      <circle cx="420" cy="255" r="38" fill="url(#g4)" opacity="0.92"/>
      <circle cx="350" cy="255" r="30" fill="url(#g3)" opacity="0.92"/>
      <circle cx="505" cy="265" r="24" fill="#ff8a3d" opacity="0.9"/>
      <circle cx="345" cy="200" r="16" fill="#ffffff" opacity="0.55"/>
      <!-- scattered stars -->
      <circle cx="330" cy="100" r="3" fill="#fff" opacity="0.8"/>
      <circle cx="520" cy="110" r="2.5" fill="#fff" opacity="0.8"/>
      <circle cx="540" cy="200" r="2.5" fill="#fff" opacity="0.7"/>
      <circle cx="320" cy="300" r="2.5" fill="#fff" opacity="0.7"/>
    </g>

    <text x="320" y="362" text-anchor="middle" font-size="26" font-weight="700" fill="#2c3047">Projector</text>
    <text x="320" y="388" text-anchor="middle" font-size="16" fill="#6b7280">projecting the dream-art image</text>
  </g>
</svg>
